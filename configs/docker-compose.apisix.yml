# APISIX Docker Compose 配置 - 使用环境变量配置admin key
services:
  apisix:
    image: apache/apisix:3.0.0-debian
    container_name: go-mall-apisix
    environment:
      - APISIX_ETCD_HOSTS=http://etcd:2379
      - APISIX_DEPLOYMENT_ROLE=traditional
      - APISIX_ROLE_TRADITIONAL_CONFIG_PROVIDER=etcd
      # 使用环境变量配置admin key
      - APISIX_ADMIN_API_ADMIN_KEY=[{"name":"admin","key":"edd1c9f034335f136f97ad3da9f658a9","role":"admin"}]
    volumes:
      - ./apisix_config/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    ports:
      - "8888:9080"    # HTTP 映射到 8888
      - "9443:9443"
      - "9180:9180"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - go-mall
    restart: unless-stopped
    depends_on:
      - etcd

  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: go-mall-apisix-etcd
    environment:
      - ETCD_ENABLE_V2=true
      - ETCD_ADVERTISE_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    volumes:
      - etcd_data:/etcd
    ports:
      - "2379:2379"
    networks:
      - go-mall
    restart: unless-stopped

volumes:
  etcd_data:

networks:
  go-mall:
    external: true
