# 路由配置 - 通过 admin API 上传
routes:
  # 用户服务
  - id: user-login
    uri: /douyin/user/login
    methods: ["POST"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  - id: user-register
    uri: /douyin/user/register
    methods: ["POST"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  - id: user-info
    uri: /douyin/user
    methods: ["GET"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  - id: user-address-add
    uri: /douyin/user/address/add
    methods: ["POST"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  - id: user-address-list
    uri: /douyin/user/address/list
    methods: ["GET"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  # 产品服务
  - id: product-list
    uri: /douyin/product/list
    methods: ["GET"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  - id: product-detail
    uri: /douyin/product
    methods: ["GET"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  - id: product-upload
    uri: /douyin/product/upload
    methods: ["POST"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  # 购物车服务
  - id: cart-add
    uri: /douyin/cart/add
    methods: ["POST"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  - id: cart-list
    uri: /douyin/cart/list
    methods: ["GET"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  - id: cart-delete
    uri: /douyin/cart/delete
    methods: ["POST"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  - id: cart-sub
    uri: /douyin/cart/sub
    methods: ["POST"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1

  # 支付服务
  - id: payment-create
    uri: /douyin/payment/create
    methods: ["POST"]
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:9000": 1
