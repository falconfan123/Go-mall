# Higress 本地开发配置 (简化版)
# 使用说明:
# 1. 先启动网络: docker network create go-mall 2>/dev/null || true
# 2. 启动 Higress: docker-compose -f docker-compose.higress.yml up -d
# 3. 访问 Higress UI: http://localhost:8889

services:
  # Higress Core (基于 Nginx 的 API 网关)
  higress-core:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/higress-core:1.3.2
    container_name: go-mall-higress-core
    ports:
      - "8888:8888"     # HTTP 网关入口 (替换原 gateway)
      - "8443:8443"     # HTTPS 网关入口
    volumes:
      - ./higress/config:/etc/higress/conf
      - higress-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Shanghai
      # 使用 Consul 进行服务发现
      - HIGRESS_DISCOVERY_TYPE=consul
      - CONSUL_ADDRESS=host.docker.internal:8500
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - go-mall
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/-/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Higress Console (管理 UI)
  higress-console:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/console:1.3.2
    container_name: go-mall-higress-console
    ports:
      - "8889:8080"     # Higress UI 端口
    environment:
      - TZ=Asia/Shanghai
    networks:
      - go-mall
    depends_on:
      - higress-core
    restart: unless-stopped

volumes:
  higress-data:

networks:
  go-mall:
    external: true
