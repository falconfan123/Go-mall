Name: checkout.rpc
ListenOn: 0.0.0.0:10005
Mode: dev
Timeout: 0
Consul:
  Host: localhost:8500 # consul endpoint
  Key: checkout.rpc
  Meta:
    Protocol: grpc

# 链路追踪
Telemetry:
  Name: checkout.rpc
  Endpoint: http://localhost:14268/api/traces
  Batcher: zipkin
  Sampler: 1.0

Log:
  ServiceName: "checkout-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

PostgresConfig:
  datasource: postgres://root:fht3825099@localhost:5432/mall?sslmode=disable
  conntimeout: 5

InventoryRpc:
  Target: consul://localhost:8500/inventory.rpc?wait=14s
  NonBlock: true

ProductRpc:
  Target: consul://localhost:8500/products.rpc?wait=14s
  NonBlock: true
  Timeout: 10000
CouponsRpc:
  Target: consul://localhost:8500/coupons.rpc?wait=14s
  NonBlock: true
  Timeout: 10000
RedisConf:
  Host: localhost:6379
  Pass: ""
  Tls: false


