Name: audit.rpc
ListenOn: 0.0.0.0:10008
Mode: pro
Timeout: 5000
# 服务发现
Consul:
  Host: ${CONSUL_HOST}
  Key: audit.rpc # 与服务名称保持一致
  Meta:
    Protocol: grpc
  Tag:
    - "grpc"

PostgresConfig:
  datasource: ${POSTGRES_DATA_SOURCE}

Log:
  ServiceName: "audit-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

# 指标监控配置
DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 11008
  EnablePprof: false

# 链路追踪
Telemetry:
  Name: audit.rpc # 与服务名称保持一致
  Endpoint: ${TRACES_ENDPOINT}
  Batcher: zipkin
  Sampler: 0.1 # 采样率，1.0表示全部采集, 0.1表示10%

# RabbitMQ 配置
RabbitMQ:
  Host: ${RABBITMQ_HOST}
  Port: ${RABBITMQ_PORT}
  User: ${RABBITMQ_USERNAME}
  Pass: ${RABBITMQ_PASSWORD}
  VHost: ${RABBITMQ_VHOST}

ElasticSearch:
  Addr: ${ELASTICSEARCH_HOST}
