Name: audit.rpc
ListenOn: 0.0.0.0:10008
# 服务发现
Consul:
  Host: localhost:8500 # consul endpoint
  Key: audit.rpc
  Meta:
    Protocol: grpc

# 链路追踪
Telemetry:
  Name: audit.rpc
  Endpoint: http://localhost:14268/api/traces
  Batcher: zipkin
  Sampler: 1.0
Log:
  ServiceName: "audit-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

PostgresConfig:
  datasource: postgres://root:fht3825099@localhost:5432/mall?sslmode=disable

RabbitMQ:
  Host: "localhost"
  Port: 5672
  User: "admin"
  Pass: "admin"
  VHost: "/"

ElasticSearch:
  Addr: "http://localhost:9200"
