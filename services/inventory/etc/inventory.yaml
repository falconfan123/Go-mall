Name: inventory.rpc
ListenOn: 0.0.0.0:10011
Mode: dev

# 服务发现
Consul:
  Host: localhost:8500
  Key: inventory.rpc
  Meta:
    Protocol: grpc

Telemetry:
  Name: inventory.rpc
  Endpoint: http://localhost:14268/api/traces
  Batcher: zipkin
  Sampler: 1.0

Log:
  ServiceName: inventory-rpc
  Mode: console
  Encoding: json
  Path: ./logs/inventory-rpc

MysqlConfig:
  datasource: root:fht3825099@tcp(localhost:3306)/mall?charset=utf8mb4&parseTime=True&loc=Local

RedisConf:
  Host: localhost:6379
  Pass: ""
  Tls: false

