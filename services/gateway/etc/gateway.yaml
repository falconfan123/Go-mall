Name: gateway
Host: 0.0.0.0
Port: 8080

# 日志配置 - 输出到 stdout 由容器收集
Log:
  Mode: 'console'
  Encoding: 'json'
  Stat: false

Auth:
  AccessSecret: "u666" # Matches auths service secret
  AccessExpire: 86400

Upstreams:
  - Grpc:
      Target: 127.0.0.1:10001
    Mappings:
      - Method: post
        Path: /douyin/user/login
        RpcPath: users.Users/Login
      - Method: post
        Path: /douyin/user/register
        RpcPath: users.Users/Register
      - Method: get
        Path: /douyin/user
        RpcPath: users.Users/GetUser
      - Method: post
        Path: /douyin/user/address/add
        RpcPath: users.Users/AddAddress
      - Method: get
        Path: /douyin/user/address/list
        RpcPath: users.Users/ListAddresses

  - Grpc:
      Target: 127.0.0.1:10002
    Mappings:
      - Method: get
        Path: /douyin/product/list
        RpcPath: product.ProductCatalogService/GetAllProduct
      - Method: get
        Path: /douyin/product
        RpcPath: product.ProductCatalogService/GetProduct
      - Method: post
        Path: /douyin/product/upload
        RpcPath: product.ProductCatalogService/GetUploadURL
      - Method: get
        Path: /douyin/product/list/cursor
        RpcPath: product.ProductCatalogService/ListProducts

  - Grpc:
      Target: 127.0.0.1:10003
    Mappings:
      - Method: post
        Path: /douyin/cart/add
        RpcPath: carts.Cart/CreateCartItem
      - Method: get
        Path: /douyin/cart/list
        RpcPath: carts.Cart/CartItemList
      - Method: post
        Path: /douyin/cart/delete
        RpcPath: carts.Cart/DeleteCartItem
      - Method: post
        Path: /douyin/cart/sub
        RpcPath: carts.Cart/SubCartItem

  - Grpc:
      Target: 127.0.0.1:10006
    Mappings:
      - Method: post
        Path: /douyin/payment/create
        RpcPath: payment.Payment/CreatePayment

  # ==================== 秒杀系统服务 ====================

  # System 时间同步服务 (端口 10010)
  - Grpc:
      Target: 127.0.0.1:10010
    Mappings:
      - Method: get
        Path: /api/v1/system/time
        RpcPath: system.System/Time

  # Activity 活动服务 (端口 10011)
  - Grpc:
      Target: 127.0.0.1:10011
    Mappings:
      - Method: get
        Path: /api/v1/activity/token
        RpcPath: activity.Activity/Token

  # Order 订单服务 (端口 10004)
  - Grpc:
      Target: 127.0.0.1:10004
    Mappings:
      - Method: post
        Path: /api/v1/order/seckill
        RpcPath: order.OrderService/Seckill

  # ==================== Admin 管理服务 ====================

  # Admin 服务 (端口 10012)
  - Grpc:
      Target: 127.0.0.1:10012
    Mappings:
      # 商品管理
      - Method: post
        Path: /api/v1/admin/product
        RpcPath: admin.AdminProductService/CreateProduct
      - Method: put
        Path: /api/v1/admin/product
        RpcPath: admin.AdminProductService/UpdateProduct
      - Method: delete
        Path: /api/v1/admin/product
        RpcPath: admin.AdminProductService/DeleteProduct
      - Method: get
        Path: /api/v1/admin/product
        RpcPath: admin.AdminProductService/GetProduct
      - Method: get
        Path: /api/v1/admin/products
        RpcPath: admin.AdminProductService/ListProducts
      # 分类管理
      - Method: post
        Path: /api/v1/admin/category
        RpcPath: admin.AdminCategoryService/CreateCategory
      - Method: put
        Path: /api/v1/admin/category
        RpcPath: admin.AdminCategoryService/UpdateCategory
      - Method: delete
        Path: /api/v1/admin/category
        RpcPath: admin.AdminCategoryService/DeleteCategory
      - Method: get
        Path: /api/v1/admin/categories
        RpcPath: admin.AdminCategoryService/ListCategories
      # 秒杀活动管理
      - Method: post
        Path: /api/v1/admin/seckill/activity
        RpcPath: admin.AdminSeckillService/CreateActivity
      - Method: put
        Path: /api/v1/admin/seckill/activity
        RpcPath: admin.AdminSeckillService/UpdateActivity
      - Method: delete
        Path: /api/v1/admin/seckill/activity
        RpcPath: admin.AdminSeckillService/DeleteActivity
      - Method: get
        Path: /api/v1/admin/seckill/activity
        RpcPath: admin.AdminSeckillService/GetActivity
      - Method: get
        Path: /api/v1/admin/seckill/activities
        RpcPath: admin.AdminSeckillService/ListActivities
      - Method: put
        Path: /api/v1/admin/seckill/activity/time
        RpcPath: admin.AdminSeckillService/SetActivityTime
      - Method: put
        Path: /api/v1/admin/seckill/activity/stock
        RpcPath: admin.AdminSeckillService/SetActivityStock
      # 库存管理
      - Method: post
        Path: /api/v1/admin/inventory/adjust
        RpcPath: admin.AdminInventoryService/AdjustInventory
      - Method: get
        Path: /api/v1/admin/inventory
        RpcPath: admin.AdminInventoryService/GetInventory
