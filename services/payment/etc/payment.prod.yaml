Name: payment.rpc
ListenOn: 0.0.0.0:10006
Mode: pro
Timeout: 30000
# 服务发现
Consul:
  Host: ${CONSUL_HOST}
  Key: payment.rpc
  Meta:
    Protocol: grpc
  Tag:
    - "grpc"

Telemetry:
  Name: payment.rpc
  Endpoint: ${TRACES_ENDPOINT}
  Batcher: zipkin
  Sampler: 0.1  # 采样率，1.0表示全部采集, 0.1表示10%
Log:
  ServiceName: "payment-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

PostgresConfig:
  datasource: ${POSTGRES_DATA_SOURCE}

RedisConf:
  Host: ${REDIS_HOST}
  Pass: ${REDIS_PASSWORD}
  Tls: false

Alipay:
  AppId: ${ALIPAY_APPID}
  AlipayPublicKey: ${ALIPAY_PUBLIC_KEY}
  PrivateKey: ${ALIPAY_PRIVATE_KEY}
  NotifyURL: ${ALIPAY_NOTIFY_URL}
  NotifyPath: ${ALIPAY_NOTIFY_PATH}
  NotifyPort: ${ALIPAY_NOTIFY_PORT}
  ReturnURL: ${ALIPAY_RETURN_URL}
# 指标监控配置
DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 11006
  EnablePprof: false
OrderRpc:
  Target: consul://${CONSUL_HOST}/order.rpc?wait=14s
  NonBlock: true
  Timeout: 25000

RabbitMQConfig:
  Host: ${RABBITMQ_HOST}
  Port: ${RABBITMQ_PORT}
  User: ${RABBITMQ_USERNAME}
  Pass: ${RABBITMQ_PASSWORD}
  VHost: ${RABBITMQ_VHOST}