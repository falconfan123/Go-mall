Name: users.rpc
ListenOn: 0.0.0.0:10001
Mode: pro
# 服务发现
Consul:
  Host: ${CONSUL_HOST} 
  Key: users.rpc
  Meta:
    Protocol: grpc
  Tag:
    - "grpc"  # api服务就是api，rpc是grpc


PostgresConfig:
  datasource: ${POSTGRES_DATA_SOURCE}
  Conntimeout: 5
Cache:
- Host: ${REDIS_HOST} #缓存地址
  Pass: ${REDIS_PASSWORD}
  Type: node   

Log:
  ServiceName: "users-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

AuditRpc:
  Target: consul://${CONSUL_HOST}/audit.rpc?wait=14s
  NonBlock: true

# 指标监控配置
DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 11001 
  EnablePprof: false

# 链路追踪
Telemetry:
  Name: users.rpc # 与服务名称保持一致
  Endpoint: ${TRACES_ENDPOINT}
  Batcher: zipkin
  Sampler: 0.1  # 采样率，1.0表示全部采集, 0.1表示10%
RedisConf:
  Host: ${REDIS_HOST}
  Pass: ${REDIS_PASSWORD}
  Tls: false
GorseConfig:
 GorseAddr: ${GORSE HOST}
 GorseApikey: ${GORSE_APIKEY}