Name: users.rpc
ListenOn: 0.0.0.0:10001
Mode: dev

# 服务发现
Consul:
  Host: localhost:8500 # consul endpoint
  Key: users.rpc
  Meta:
    Protocol: grpc

# 链路追踪
Telemetry:
  Name: users.rpc
  Endpoint: http://localhost:14268/api/traces
  Batcher: zipkin
  Sampler: 1.0

AuditRpc:
  Target: consul://localhost:8500/audit.rpc?wait=14s
  NonBlock: true 

AuthsRpc:
  Target: consul://localhost:8500/auths.rpc?wait=14s
  NonBlock: true

Log:
  ServiceName: "users-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

PostgresConfig:
  DataSource: postgres://root:fht3825099@localhost:5432/mall?sslmode=disable
  Conntimeout: 5

Salt: "J1j1zH4zH4"
AuthConfig:
  AccessSecret: "uKq5xR8vW2zN9mP4sL7jH6yG3bF1dC0"
  AccessExpire: 86400


Cache:
  - Host: localhost:6379 #缓存地址
    Pass: ""
    Type: node  

Prometheus:
  Host: 0.0.0.0   # 监控暴露的 IP
  Port: 9100       # 监控暴露的端口
  Path: /metrics   # 默认路径（可自定义）

RedisConf:
  Host: localhost:6379
  Pass: ""
  Tls: false
GorseConfig:
  GorseAddr: http://localhost:8088
  GorseApikey: 5105502fc46a411c896aa5b50c31e951
