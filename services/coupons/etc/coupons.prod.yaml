Name: coupons.rpc
ListenOn: 0.0.0.0:10009
Mode: pro
Timeout: 8000

# 服务发现
Consul:
  Host: ${CONSUL_HOST}
  Key: coupons.rpc
  Meta:
    Protocol: grpc
  Tag:
    - "grpc"

Telemetry:
  Name: coupons.rpc # 与服务名称保持一致
  Endpoint: ${TRACES_ENDPOINT}
  Batcher: zipkin
  Sampler: 0.1 # 采样率，1.0表示全部采集, 0.1表示10%

Log:
  ServiceName: "coupons-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

PostgresConfig:
  datasource: ${POSTGRES_DATA_SOURCE}

RedisConf:
  Host: ${REDIS_HOST}
  Pass: ${REDIS_PASSWORD}
  Tls: false


ProductRpc:
  Target: consul://${CONSUL_HOST}/products.rpc?wait=14s
  NonBlock: true
  Timeout: 5000

# 指标监控配置
DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 11009
  EnablePprof: false