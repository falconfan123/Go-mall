Name: coupons.rpc
ListenOn: 0.0.0.0:10009


# 服务发现
Consul:
  Host: localhost:8500 # consul endpoint
  Key: coupons.rpc
  Meta:
    Protocol: grpc

# 链路追踪
Telemetry:
  Name: coupons.rpc
  Endpoint: http://localhost:14268/api/traces
  Batcher: zipkin
  Sampler: 1.0

Log:
  ServiceName: "coupons-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

PostgresConfig:
  datasource: postgres://root:fht3825099@localhost:5432/mall?sslmode=disable


RedisConf:
  Host: localhost:6379
  Type: node
  Pass: "" # 如果有密码则填写
  Tls: false


ProductRpc:
  Target: consul://localhost:8500/products.rpc?wait=14s
  NonBlock: true