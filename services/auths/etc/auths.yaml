Name: auths.rpc
ListenOn: 0.0.0.0:10000
Mode: dev

# 服务发现
Consul:
  Host: localhost:8500 # consul endpoint
  Key: auths.rpc
  Meta:
    Protocol: grpc

# 链路追踪
Telemetry:
  Name: auths.rpc
  Endpoint: http://localhost:14268/api/traces
  Batcher: zipkin
  Sampler: 1.0
# localhost

Log:
  ServiceName: "auths-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

PostgresConfig:
  datasource: postgres://root:fht3825099@localhost:5432/mall?sslmode=disable

SessionRedis:
  Host: localhost:6379
  Type: node

DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port:  11000
  EnablePprof: false

# Prometheus 监控暴露
Prometheus:
  Host: 0.0.0.0   # 监控暴露的 IP
  Port: 9100       # 监控暴露的端口
  Path: /metrics   # 默认路径