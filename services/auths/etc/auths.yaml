Name: auths.rpc
ListenOn: 0.0.0.0:10000
Mode: dev

# 服务发现
Consul:
  Host: localhost:8500 # consul endpoint
  Key: auths.rpc
  Meta:
    Protocol: grpc

# 链路追踪
Telemetry:
  Name: auths.rpc
  Endpoint: http://localhost:14268/api/traces
  Batcher: zipkin
  Sampler: 1.0
# localhost

Log:
  ServiceName: "auths-rpc"
  Mode: 'console'
  Encoding: "json"
  Path: "./logs/auths-rpc"

PostgresConfig:
  datasource: postgres://root:fht3825099@localhost:5432/mall?sslmode=disable

SessionRedis:
  Host: localhost:6379
  Type: node

DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port:  11000
  EnablePprof: false