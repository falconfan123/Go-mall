Name: carts.rpc
ListenOn: 0.0.0.0:10003 # 端口见接口文档
Mode: pro
Timeout: 5000

# 服务发现
Consul:
  Host: ${CONSUL_HOST}
  Key: carts.rpc # 与服务名称保持一致
  Meta:
    Protocol: grpc # 这里无需修改
  Tag:
    - "grpc"  # api服务就是api，rpc是grpc

PostgresConfig:
  datasource: ${POSTGRES_DATA_SOURCE}
  conntimeout: 5

Log:
  ServiceName: "carts-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

# 指标监控配置
DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 11003  #服务端口+1000，如果服务端口是10001，则指标端口就是11001
  EnablePprof: false

# 链路追踪
Telemetry:
  Name: carts.rpc # 与服务名称保持一致
  Endpoint: ${TRACES_ENDPOINT}
  Batcher: zipkin
  Sampler: 0.1 # 采样率，1.0表示全部采集, 0.1表示10%