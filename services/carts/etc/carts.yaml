Name: carts.rpc
ListenOn: 0.0.0.0:10003
Mode: dev

Consul:
  Host: localhost:8500 # consul endpoint
  Key: carts.rpc
  Meta:
    Protocol: grpc

# 链路追踪
Telemetry:
  Name: carts.rpc
  Endpoint: http://localhost:14268/api/traces
  Batcher: zipkin
  Sampler: 1.0

Log:
  ServiceName: "carts-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

PostgresConfig:
  datasource: postgres://root:fht3825099@localhost:5432/mall?sslmode=disable
  conntimeout: 5

# Prometheus 监控暴露
Prometheus:
  Host: 0.0.0.0
  Port: 9103
  Path: /metrics

