Name: order.rpc
ListenOn: 0.0.0.0:10004
Mode: dev
Timeout: 0
# 服务发现
Consul:
  Host: localhost:8500 # consul endpoint
  Key: order.rpc
  Meta:
    Protocol: grpc

# 链路追踪
Telemetry:
  Name: order.rpc
  Endpoint: http://localhost:14268/api/traces
  Batcher: zipkin
  Sampler: 1.0

Log:
  ServiceName: "order-rpc"
  Mode: 'console'
  Encoding: "json"
  Stat: false

PostgresConfig:
  datasource: postgres://root:fht3825099@localhost:5432/mall?sslmode=disable



CheckoutRpc:
  Target: consul://localhost:8500/checkout.rpc?wait=14s
  NonBlock: true
  Timeout: 10000

CouponRpc:
  Target: consul://localhost:8500/coupons.rpc?wait=14s
  NonBlock: true
  Timeout: 10000
UserRpc:
  Target: consul://localhost:8500/users.rpc?wait=14s
  NonBlock: true
  Timeout: 10000
InventoryRpc:
  Target: consul://localhost:8500/inventory.rpc?wait=14s
  NonBlock: true
  Timeout: 10000

RabbitMQConfig:
  Host: "localhost"
  Port: 5672
  User: "admin"
  Pass: "admin"
  VHost: "/"

RedisConf:
  Host: localhost:6379
  Pass: ""
  Tls: false