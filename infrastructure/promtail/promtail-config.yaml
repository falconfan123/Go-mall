# Promtail 配置 - 抓取各服务的日志
# 确保日志目录存在: mkdir -p /Users/fan/go-mall/scripts/logs

server:
  http_listen_port: 9080
  grpc_listen_port: 9081

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  # Loki 地址 - Docker 网络内使用服务名
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Gateway 日志
  - job_name: gateway
    static_configs:
      - targets:
          - localhost
        labels:
          service: gateway
          env: development
          __path__: /Users/fan/go-mall/scripts/logs/gateway.log

  # Payment 服务日志
  - job_name: payment
    static_configs:
      - targets:
          - localhost
        labels:
          service: payment
          env: development
          __path__: /Users/fan/go-mall/scripts/logs/payment.log

