<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Mall - 电商平台</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-container">
                <h1 class="logo" onclick="showPage('home')">🛒 Go-Mall</h1>
                <div class="nav-links" id="navLinks">
                    <a href="#" onclick="showPage('home')" class="nav-link">首页</a>
                    <a href="#" onclick="showPage('products')" class="nav-link">商品</a>
                    <a href="#" onclick="showPage('flash')" class="nav-link">秒杀活动</a>
                    <a href="#" onclick="showPage('cart')" class="nav-link">购物车 <span id="cartCount" class="cart-count">0</span></a>
                    <a href="#" onclick="showPage('orders')" class="nav-link" id="ordersNav" style="display:none;">订单</a>
                </div>
                <div class="nav-auth" id="navAuth">
                    <button onclick="showPage('login')" class="btn btn-small">登录</button>
                    <button onclick="showPage('register')" class="btn btn-primary btn-small">注册</button>
                </div>
                <div class="nav-user" id="navUser" style="display:none;">
                    <span id="userName">用户</span>
                    <button onclick="logout()" class="btn btn-small">退出</button>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 首页 -->
            <div id="page-home" class="page">
                <div class="hero">
                    <h1>欢迎来到 Go-Mall</h1>
                    <p>基于 Go-Zero 微服务架构的现代电商平台</p>
                    <button onclick="showPage('products')" class="btn btn-primary btn-large">浏览商品</button>
                </div>
                <div class="features">
                    <div class="feature-card">
                        <h3>🚀 高性能</h3>
                        <p>基于 Go-Zero 微服务架构，支持高并发场景</p>
                    </div>
                    <div class="feature-card">
                        <h3>🔐 安全可靠</h3>
                        <p>JWT 认证，数据加密传输</p>
                    </div>
                    <div class="feature-card">
                        <h3>📦 分布式事务</h3>
                        <p>集成 DTM，保证数据一致性</p>
                    </div>
                </div>
            </div>

            <!-- 登录页 -->
            <div id="page-login" class="page" style="display:none;">
                <div class="auth-container">
                    <h2>用户登录</h2>
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>账号</label>
                            <input type="text" id="loginEmail" required placeholder="请输入账号">
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="loginPassword" required placeholder="请输入密码">
                        </div>
                        <button type="submit" class="btn btn-primary btn-wide">登录</button>
                    </form>
                    <p class="auth-link">还没有账号？ <a href="#" onclick="showPage('register')">立即注册</a></p>
                </div>
            </div>

            <!-- 注册页 -->
            <div id="page-register" class="page" style="display:none;">
                <div class="auth-container">
                    <h2>用户注册</h2>
                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label>账号</label>
                            <input type="text" id="registerEmail" required placeholder="请输入账号">
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="registerPassword" required placeholder="请输入密码">
                        </div>
                        <div class="form-group">
                            <label>确认密码</label>
                            <input type="password" id="registerConfirmPassword" required placeholder="请再次输入密码">
                        </div>
                        <button type="submit" class="btn btn-primary btn-wide">注册</button>
                    </form>
                    <p class="auth-link">已有账号？ <a href="#" onclick="showPage('login')">立即登录</a></p>
                </div>
            </div>

            <!-- 商品页 -->
            <div id="page-products" class="page" style="display:none;">
                <div class="page-header">
                    <h2>商品列表</h2>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索商品..." onkeyup="filterProducts()">
                    </div>
                </div>
                <div id="productList" class="product-grid">
                    <!-- 商品会在这里动态加载 -->
                </div>
            </div>

            <!-- 商品详情页 -->
            <div id="page-product-detail" class="page" style="display:none;">
                <div class="product-detail" id="productDetail">
                    <!-- 商品详情会在这里动态加载 -->
                </div>
            </div>

            <!-- 购物车页 -->
            <div id="page-cart" class="page" style="display:none;">
                <div class="page-header">
                    <h2>购物车</h2>
                </div>
                <div id="cartList" class="cart-list">
                    <!-- 购物车商品会在这里动态加载 -->
                </div>
                <div class="cart-summary" id="cartSummary" style="display:none;">
                    <div class="cart-total">
                        <span>总计: ¥<span id="cartTotal">0</span></span>
                        <button onclick="checkout()" class="btn btn-primary">结算</button>
                    </div>
                </div>
            </div>

            <!-- 秒杀活动页 -->
            <div id="page-flash" class="page" style="display:none;">
                <div class="page-header">
                    <h2>秒杀活动</h2>
                    <div class="countdown" id="countdown">
                        距离活动结束: <span id="countdownTime">00:00:00</span>
                    </div>
                </div>
                <div id="flashProductList" class="flash-product-grid">
                    <!-- 秒杀商品会在这里动态加载 -->
                </div>
            </div>

            <!-- 支付页 -->
            <div id="page-payment" class="page" style="display:none;">
                <div class="page-header">
                    <h2>订单支付</h2>
                </div>
                <div class="payment-container" id="paymentContainer">
                    <!-- 订单信息和支付方式会在这里显示 -->
                </div>
            </div>

            <!-- 订单页 -->
            <div id="page-orders" class="page" style="display:none;">
                <div class="page-header">
                    <h2>我的订单</h2>
                </div>
                <div id="orderList" class="order-list">
                    <!-- 订单会在这里动态加载 -->
                </div>
            </div>
        </main>

        <!-- 消息提示 -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="app.js?v=4"></script>
</body>
</html>
