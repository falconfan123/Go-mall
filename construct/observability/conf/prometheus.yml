# 全局配置
global:
  scrape_interval:     15s # 将搜刮间隔设置为每15秒一次。默认是每1分钟一次。
  evaluation_interval: 15s # 每15秒评估一次规则。默认是每1分钟一次。

# 搜刮配置
scrape_configs:
  - job_name: 'prometheus' # 监控Prometheus
    # 覆盖全局默认值，每15秒从该作业中刮取一次目标
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:9090']

  # ============ Go-mall 微服务监控 ============
  # Gateway HTTP 服务
  - job_name: 'gateway'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:8888']
        labels:
          namespace: go-mall
          service: gateway

  # 用户服务 (gRPC + metrics on 11000)
  - job_name: 'users'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:11000']
        labels:
          namespace: go-mall
          service: users-rpc

  # 认证服务 (gRPC + metrics on 9101)
