name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: '1.25'

jobs:
  # 第一阶段：本地快速检查
  # 这个阶段模拟本地运行，主要做快速筛选
  local-check:
    name: 本地快速检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 安装 lint 工具
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/lint/golint@latest
          go install github.com/mgechev/revive@latest

      - name: 下载依赖
        run: go mod download

      - name: 代码格式检查
        run: |
          # 检查是否有未格式化的文件
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "以下文件格式不正确:"
            echo "$UNFORMATTED" | head -30
            exit 1
          fi

      - name: go vet 检查
        run: go vet ./...

      - name: staticcheck 快速检查
        run: staticcheck -checks=basic,graceful ./...

      - name: 编译检查
        run: go build -o /dev/null ./...

  # 第二阶段：完整 lint 检查
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    needs: local-check
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 安装 lint 工具
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/lint/golint@latest
          go install github.com/mgechev/revive@latest

      - name: 下载依赖
        run: go mod download

      - name: golint 检查
        run: golint -set_exit_status ./... || true

      - name: revive 检查
        run: revive ./... || true

      - name: staticcheck 完整检查
        run: staticcheck ./...

  # 第三阶段：测试
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: local-check
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 下载依赖
        run: go mod download

      - name: 运行测试
        run: go test -race -short -timeout 10m ./...

  # 第四阶段：构建验证
  build:
    name: 构建验证
    runs-on: ubuntu-latest
    needs: local-check
    strategy:
      matrix:
        service:
          - auths
          - audit
          - carts
          - checkout
          - coupons
          - inventory
          - order
          - payment
          - product
          - users
          - gateway
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 下载依赖
        run: go mod download

      - name: 构建 ${{ matrix.service }} 服务
        run: |
          case "${{ matrix.service }}" in
            auths) cd services/auths/auths ;;
            audit) cd services/audit/audit ;;
            carts) cd services/carts/carts ;;
            checkout) cd services/checkout/checkout ;;
            coupons) cd services/coupons/coupons ;;
            inventory) cd services/inventory/inventory ;;
            order) cd services/order/order ;;
            payment) cd services/payment/payment ;;
            product) cd services/product/product ;;
            users) cd services/users/users ;;
            gateway) cd services/gateway ;;
          esac
          go build -o /dev/null .

  # 第五阶段：安全扫描
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: local-check
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 下载依赖
        run: go mod download

      - name: 运行 go vet
        run: go vet -unsafeptr=false ./...

      - name: 检查敏感信息
        run: |
          # 检查是否有硬编码的密钥等
          git diff --staged --name-only | xargs grep -l "password\|secret\|key\|token" 2>/dev/null || true
          grep -r "password\s*=\s*['\"]" . --include="*.go" 2>/dev/null | grep -v "_test.go" || true
          grep -r "api[_-]key\s*[:=]\s*['\"]" . --include="*.go" 2>/dev/null | grep -v "_test.go" || true

  # 依赖检查
  deps:
    name: 依赖检查
    runs-on: ubuntu-latest
    needs: local-check
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 检查 go.mod 一致性
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: 检查依赖漏洞
        uses: govulncheck/action@v3
        with:
          go-version: '1.25'
          package: ./...
